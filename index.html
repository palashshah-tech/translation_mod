<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translation Moderator — Xiberlinc</title>
  <meta name="description" content="Org-wide translation moderation tool for Xiberlinc projects. Review, edit, and approve AI-generated Japanese translations across multiple repositories." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.82/build/spline-viewer.js"></script>
</head>
<body>
  <div id="spline-canvas-container">
    <spline-viewer url="/scene.splinecode" events-target="none" loading-anim-type="none"></spline-viewer>
  </div>

  <div id="login-container" style="display: none;">
    <div class="login-error" id="login-error" style="display: none;"></div>
    <button class="btn btn-primary btn-login" id="btn-google-login">
      <svg class="google-icon" viewBox="0 0 24 24" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.67 1.62 14.99 1 12 1 7.35 1 3.39 3.65 1.5 7.5l3.86 3C6.31 7.55 9.01 5.04 12 5.04z"/>
        <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.34H12v4.58h6.48c-.28 1.48-1.12 2.74-2.38 3.58l3.69 2.87c2.16-1.98 3.7-4.91 3.7-8.69z"/>
        <path fill="#FBBC05" d="M5.36 14.68c-.24-.72-.38-1.49-.38-2.28s.14-1.56.38-2.28L1.5 7.12C.54 9.09 0 11.27 0 13.56c0 2.29.54 4.47 1.5 6.44l3.86-3.32z"/>
        <path fill="#34A853" d="M12 23c3.24 0 5.97-1.07 7.96-2.91l-3.69-2.87c-1.03.69-2.34 1.1-3.95 1.1-3.07 0-5.77-2.51-6.7-5.46L1.75 16.2C3.65 20.08 7.61 23 12 23z"/>
      </svg>
      Sign in with Google
    </button>
  </div>

  <div id="app" style="display: none;">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">翻</span>
          <div class="logo-text">
            <h1>Translation Moderator</h1>
            <span class="logo-sub">xiberlinc</span>
          </div>
        </div>
      </div>
      <div class="header-center">
        <!-- Main navigation via cards on home page -->
      </div>
      <div class="header-right">
        <div class="status-badge" id="status-badge">
          <span class="status-dot"></span>
          <span class="status-text">Ready</span>
        </div>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar" id="stats-bar" style="display:none;">
      <div class="stat">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">Total keys</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-translated">0</span>
        <span class="stat-label">Translated</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-edited">0</span>
        <span class="stat-label">Edited now</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="progress-label" id="progress-label">0%</span>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar" style="display:none;">
      <div class="search-box">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14.5 14.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input type="text" id="search-input" placeholder="Filter by key or text…" />
      </div>
      <div class="toolbar-actions">
        <label class="filter-checkbox">
          <input type="checkbox" id="filter-edited" />
          <span>Show edited only</span>
        </label>
        <label class="filter-checkbox">
          <input type="checkbox" id="filter-missing" />
          <span>Show missing only</span>
        </label>
        <button class="btn btn-secondary" id="btn-reset">Reset all</button>
        <button class="btn btn-primary" id="btn-save" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 10v3a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1v-3M8 2v9M5 8l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Commit & Create PR
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <main id="main-content">
      <!-- Projects grid shown initially -->
      <div class="projects-home" id="projects-home">
        <div class="projects-grid" id="projects-grid"></div>
      </div>

      <!-- Loading state -->
      <div class="loading-state" id="loading-state" style="display:none;">
        <div class="spinner"></div>
        <p>Loading translations from GitHub…</p>
      </div>

      <!-- Error state -->
      <div class="error-state" id="error-state" style="display:none;">
        <div class="error-icon">⚠️</div>
        <h2 id="error-title">Error</h2>
        <p id="error-message"></p>
      </div>

      <!-- Translation table -->
      <div class="table-container" id="table-container" style="display:none;">
        <table class="translation-table" id="translation-table">
          <thead>
            <tr>
              <th class="col-key">Key</th>
              <th class="col-en">English</th>
              <th class="col-jp-ai">AI 日本語</th>
              <th class="col-jp-human">Human Review</th>
              <th class="col-status">Status</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </main>

    <!-- Commit modal -->
    <div class="modal-overlay" id="modal-overlay" style="display:none;">
      <div class="modal" id="commit-modal">
        <div class="modal-header">
          <h2>Commit Translations</h2>
          <button class="modal-close" id="modal-close">&times;</button>
        </div>
        <div class="modal-body" id="modal-body">
          <!-- Filled dynamically -->
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="modal-confirm">Create PR</button>
        </div>
      </div>
    </div>

    <!-- Success toast -->
    <div class="toast" id="toast" style="display:none;">
      <div class="toast-content" id="toast-content"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
